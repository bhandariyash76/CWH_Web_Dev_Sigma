<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Shadow and Outline</title>
    <style>
.box{
    border: 5px solid black;
    box-shadow: 10px 10px 5px grey;
    text-shadow: 2px 2px 5px red;
    padding: 20px;
    outline: 3px dashed blue;
    outline-offset: 5px;
    border-radius: 10px;

}
    </style>
</head>
<body>
    <div class="box">
        i am a box with shadow and outline
    </div>
</body>
</html>
