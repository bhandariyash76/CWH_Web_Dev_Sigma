<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styling Lists using CSS</title>
    <style>
        nav ul li{
            background-color: yellow;
            list-style: none inside;
            /* list-style-image: url('https://cdn-icons-png.flaticon.com/512/25/25231.png'); */
            list-style-type: disc;
        }
        nav ul{
            display: flex;
        }
    </style>
</head>
<body>
    <nav>
        <div>
            Navbar
        </div>
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Contact</li>
        </ul>
    </nav>
</body>
</html>
