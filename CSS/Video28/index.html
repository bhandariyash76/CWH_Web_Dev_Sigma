<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position Property</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            height: 30vh;
            width: 70vw;
            padding: 3px;
            border: 2px solid black;
            margin: 3px;

        }
        .box1{
            background-color: antiquewhite;
            position: sticky;
            z-index: 1;
            top: 10px;
            left: 10px;
        }
        .box2{
            background-color: aqua;
            position: relative;
            /* top: -48px; */
            /* left: 41px; */
        }
        .box3{
            background-color: aquamarine;
            /* position: fixed; */
            bottom: 0px;
            /* width: 100%; */
            /* height: 10%; */
        }
        .box4{
            background-color: rgb(242, 242, 23);
            position: fixed;
            bottom: -50px

            /* height: 50%; */
            /* top: 0px; */
            /* border: 0px; */
        }
        .parent{
            padding: 43px;
            margin: 34px;
            border: 2px solid black;
            /* position: absolute; */
        }
    </style>
</head>
<body>
    <div class="parent">
        
        <div class="box box1"></div>
        <div class="box box2">
           
        </div>
        <div class="box box3"></div>
        <div class="box box4"></div>
    </div>
</body>
</html>
