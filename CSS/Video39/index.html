<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css Grid</title>
    <style>
        .container{
            width: 80vw;
            height: 50vh;
            border: 2px solid black;
            display: grid;
            grid-template-columns: 1fr 1fr 1.5fr;
            grid-template-rows: 1fr 2fr 1fr;
            row-gap: 10px;
            column-gap: 10px;
            align-items: center;
            justify-items: center;
        }
        .items{
            /* height: 55px; */
            /* width: 55px; */
            border: 1px solid red;
        }

        /* .item-4{
            grid-row: 1/2;
            grid-column: 1/2;
        }
        .item-1{
            grid-row: 1/3;
            grid-column: 1/2;
        } */
    </style>
</head>
<body>
    <div class="container">
        <div class="items item-1">1</div>
        <div class="items">2 Lorem ipsum dolor sit amet.</div>
        <div class="items">3
            Lorem ipsum dolor sit amet.
        </div>
        <div class="items item-4">4</div>
        <div class="items">5</div>
    </div>
</body>
</html>
