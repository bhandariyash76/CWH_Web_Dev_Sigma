<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <style>
        body{
            background-color: lightgrey;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .main{
            border: 1px solid rgb(200, 197, 197);
            border-radius: 10px;
            padding: 5px;
            width: 45vw;
            /* display: flex; */
            /* justify-content: center; */
            /* align-items: center; */
        }
        .image{
            display: flex;
            justify-content: center;
            align-items: center;
            
        }
        .image img{
            width: 95%;
            height: 50%;
            padding: 5px;
            border-radius: 15px;
        }
        .tags{
            margin: 10px;
            
        }
        .tags span{
            color: rgb(121, 119, 119);
            margin: 5px;
            padding: 5px;
            border: 1px solid rgba(134, 132, 132, 0.578);
            border-radius: 15px;
        }
        .content{
            margin: 5px;
            padding: 5px;
        }
        .para{
            color: gray;
        }
        .readmore{
            justify-content: center;
            align-items: center;
            display: flex;
            border: 5px;
            border-radius: 15px;
            /* background-color: skyblue; */
            align-content: center;
        }
        .readmore span{
            background-color: skyblue;
            padding: 10px;
            border-radius: 25px;
            color: darkblue;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="image">
            <img src="https://thumbs.dreamstime.com/b/panoramic-russian-winter-landscape-forest-beautiful-frozen-river-sunset-scenery-winter-trees-water-blue-sky-92751564.jpg?w=992" alt="image">
        </div>
        <div class="tags">
            <span>
                Nature
            </span>
            <span>
                Lake   
            </span>
        </div>
        <div class="content">

            <h2>
                Lorem, ipsum dolor.
            </h2>
            <div class="para">
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas nisi praesentium culpa error non doloremque maiores voluptates laudantium repellendus optio!</p>
            </div>
        </div>
            <div class="readmore">
                <span>
                Read More
            </span>
        </div>
    </div>
</body>
</html>
