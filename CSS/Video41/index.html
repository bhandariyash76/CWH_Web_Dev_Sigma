<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 6</title>
    <style>
        nav {
            display: flex;
            justify-content: space-between; /* Pushes logo and items apart */
            align-items: center;
            padding: 0 20px;
            background-color: #f4f4f4;
        }

        .items {
            display: flex;
            list-style-type: none;
            gap: 20px; /* Adds space between menu items */
        }

        .logo {
            font-weight: bold;
            font-size: 1.2rem;
            list-style-type: none;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">UltraEdit</div>
            <ul class="items">
                <li>products</li>
                <li>pricing</li>
                <li>resources</li>
                <li>about us</li>
            </ul>
        </nav>
    </header>
</body>
</html>
