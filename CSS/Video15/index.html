<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Inline, External and Internal CSS</title>
</head>
<body>
    <h1>Inline, External and Internal CSS</h1>
    <div style="color: red; font-size: 20px;">This is a div element with internal CSS</div>
    <p>This is a paragraph element with external CSS</p>
    <span style="color: blue; font-size: 18px;">This is a span element with inline CSS</span>

</body>
</html>
